name: docker

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "tags=ghcr.io/qa-guru/tg-spam:${tag},ghcr.io/qa-guru/tg-spam:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "tags=ghcr.io/qa-guru/tg-spam:master,ghcr.io/qa-guru/tg-spam:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/qa-guru/tg-spam:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CI=github
            GITHUB_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      - name: Trigger deploy
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        env:
          DISPATCH_TOKEN: ${{ secrets.BOT_ANTISPAM_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${DISPATCH_TOKEN:-}" ]]; then
            echo "BOT_ANTISPAM_DISPATCH_TOKEN not set — skip deploy dispatch"
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/qa-guru/bot-antispam.qa.guru/dispatches \
            -d '{"event_type":"deploy-bot-antispam","client_payload":{"ref":"main","image":"ghcr.io/qa-guru/tg-spam:latest"}}'
